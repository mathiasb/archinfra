apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: dcgm-exporter
  namespace: monitoring
spec:
  selector:
    matchLabels:
      app: dcgm-exporter
  template:
    metadata:
      labels:
        app: dcgm-exporter
    spec:
      hostPID: true
      hostIPC: true
      containers:
      - name: dcgm-exporter
        image: nvcr.io/nvidia/k8s/dcgm-exporter:3.3.5-3.4.0-ubuntu22.04
        ports:
        - containerPort: 9400
          name: metrics
        securityContext:
          privileged: true
        volumeMounts:
        - name: nvidia-ml
          mountPath: /host-lib/libnvidia-ml.so.1
        - name: nvidia-ml-versioned
          mountPath: /host-lib/libnvidia-ml.so.595.58.03
        - name: dev
          mountPath: /dev
        env:
        - name: LD_LIBRARY_PATH
          value: /host-lib
      volumes:
      - name: nvidia-ml
        hostPath:
          path: /usr/lib/libnvidia-ml.so.1
      - name: nvidia-ml-versioned
        hostPath:
          path: /usr/lib/libnvidia-ml.so.595.58.03
      - name: dev
        hostPath:
          path: /dev
---
apiVersion: v1
kind: Service
metadata:
  name: dcgm-exporter
  namespace: monitoring
  labels:
    app: dcgm-exporter
spec:
  ports:
  - port: 9400
    targetPort: 9400
    name: metrics
  selector:
    app: dcgm-exporter

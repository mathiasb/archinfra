apiVersion: apps/v1
kind: Deployment
metadata:
  name: supervisor
  namespace: supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: supervisor
  template:
    metadata:
      labels:
        app: supervisor
    spec:
      nodeSelector:
        kubernetes.io/hostname: koala
      imagePullSecrets:
        - name: gitea-registry
      containers:
        - name: supervisor
          image: gitea.d-ma.be/mathias/supervisor:63c238c65018e9ceb398c67b7f13474f6a2f7ca6
          ports:
            - containerPort: 3200
          envFrom:
            - secretRef:
                name: supervisor-secrets
          env:
            - name: SUPERVISOR_PORT
              value: "3200"
            - name: LITELLM_BASE_URL
              value: "http://piguard:4000"
            - name: INGEST_BASE_URL
              value: "http://localhost:3300"
            - name: LITELLM_API_KEY
              valueFrom:
                secretKeyRef:
                  name: supervisor-secrets
                  key: DMABE_LLMAPI_KEY
          volumeMounts:
            - name: brain
              mountPath: /app/brain
      volumes:
        - name: brain
          hostPath:
            path: /var/lib/supervisor/brain
            type: DirectoryOrCreate

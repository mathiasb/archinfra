apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestion
  namespace: supervisor
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ingestion
  template:
    metadata:
      labels:
        app: ingestion
    spec:
      nodeSelector:
        kubernetes.io/hostname: koala
      imagePullSecrets:
        - name: gitea-registry
      securityContext:
        runAsUser: 0
      containers:
        - name: ingestion
          image: gitea.d-ma.be/mathias/ingestion:ab19968ae2c417e5f390488f5202dd0b1a5aa97e
          ports:
            - containerPort: 3300
          env:
            - name: INGEST_PORT
              value: "3300"
            - name: INGEST_BRAIN_DIR
              value: /app/brain
            - name: INGEST_LLM_URL
              value: "http://piguard:4000/v1"
            - name: INGEST_LLM_KEY
              valueFrom:
                secretKeyRef:
                  name: supervisor-secrets
                  key: DMABE_LLMAPI_KEY
            - name: INGEST_WATCH_INTERVAL
              value: "30"
          volumeMounts:
            - name: brain
              mountPath: /app/brain
      volumes:
        - name: brain
          hostPath:
            path: /var/lib/supervisor/brain
            type: DirectoryOrCreate

apiVersion: v1
kind: ServiceAccount
metadata:
  name: infra-mcp
  namespace: infra-mcp
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: infra-mcp-reader
rules:
  # Core resources (read-only)
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - services
      - events
      - nodes
      - namespaces
      - configmaps
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  # Apps (read-only)
  - apiGroups: ["apps"]
    resources:
      - deployments
      - daemonsets
      - statefulsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # Batch (read-only)
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # Flux Kustomize controller
  - apiGroups: ["kustomize.toolkit.fluxcd.io"]
    resources:
      - kustomizations
    verbs: ["get", "list", "watch"]
  # Flux Source controller
  - apiGroups: ["source.toolkit.fluxcd.io"]
    resources:
      - gitrepositories
      - helmrepositories
      - ocirepositories
    verbs: ["get", "list", "watch"]
  # Flux Helm controller
  - apiGroups: ["helm.toolkit.fluxcd.io"]
    resources:
      - helmreleases
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: infra-mcp-reader
subjects:
  - kind: ServiceAccount
    name: infra-mcp
    namespace: infra-mcp
roleRef:
  kind: ClusterRole
  name: infra-mcp-reader
  apiGroup: rbac.authorization.k8s.io

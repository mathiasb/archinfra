# Template for infra-mcp secrets.
# To create the encrypted secret:
#
#   1. Generate a Gitea API token at https://gitea.d-ma.be/user/settings/applications
#      Scopes: read repos, read/write issues, read actions
#
#   2. Copy this file and fill in the token:
#      cp secrets.template.yaml secrets.yaml
#      # edit secrets.yaml with your token
#
#   3. Encrypt with SOPS:
#      sops -e secrets.yaml > secrets.enc.yaml
#
#   4. Remove the plaintext file:
#      rm secrets.yaml
#
apiVersion: v1
kind: Secret
metadata:
  name: infra-mcp-secrets
  namespace: infra-mcp
type: Opaque
stringData:
  GITEA_ACCESS_TOKEN: "<your-gitea-api-token>"

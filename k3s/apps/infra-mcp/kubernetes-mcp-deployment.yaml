apiVersion: apps/v1
kind: Deployment
metadata:
  name: kubernetes-mcp
  namespace: infra-mcp
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kubernetes-mcp
  template:
    metadata:
      labels:
        app: kubernetes-mcp
    spec:
      serviceAccountName: infra-mcp
      nodeSelector:
        kubernetes.io/hostname: koala
      containers:
        - name: kubernetes-mcp
          image: quay.io/containers/kubernetes-mcp-server:v0.0.60
          args: ["--read-only", "--port", "3402"]
          ports:
            - containerPort: 3402
          livenessProbe:
            tcpSocket:
              port: 3402
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              memory: "32Mi"
              cpu: "10m"
            limits:
              memory: "128Mi"
              cpu: "200m"

server:
  listen: 0.0.0.0
  port: 8080

env:
  HF_HOME: /data/models/huggingface
  CUDA_VISIBLE_DEVICES: "0"
  OMP_NUM_THREADS: "16"
  GGML_NUM_THREADS: "16"
  GGML_NO_ALLOCATOR: "1"
  LLAMA_CACHE_CAPACITY: "16GiB"
  LLAMA_SET_ROWS: "1"

llama_defaults:
  threads: 16

models:
  qwen3-coder-30b:
    source: local
    port: 5800
    cmd: >
      llama-server
      --model "/data/models/huggingface/unsloth_Qwen3-Coder-30B-A3B-Instruct-GGUF_Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf"
      --host 0.0.0.0
      --port ${PORT}
      --jinja
      --metrics
      --flash-attn on
      --ctx-size 32768
      -ngl 10
      --batch-size 128
      --ubatch-size 64
      --parallel 1
      --kv-unified
      --cache-reuse 256
      --cache-type-k q8_0
      --cache-type-v q5_0
      --temp 0.2
      --top-p 0.9
      --top-k 64
      --repeat-penalty 1.07

  phi4-mini:
    source: local
    port: 5801
    cmd: >
      llama-server
      --model "/data/models/huggingface/unsloth_Phi-4-mini-instruct-GGUF_Phi-4-mini-instruct.Q8_0.gguf"
      --host 0.0.0.0
      --port ${PORT}
      --jinja
      --metrics
      --ctx-size 8192
      -ngl 60
      --batch-size 512
      --ubatch-size 128
      --parallel 1
      --kv-unified
      --cache-reuse 256
      --cache-type-k q8_0
      --cache-type-v f16
      --temp 0.2
      --top-p 0.9
      --top-k 64
      --repeat-penalty 1.05

  phi4-14b:

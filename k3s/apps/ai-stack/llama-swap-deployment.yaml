apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-swap
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llama-swap
  template:
    metadata:
      labels:
        app: llama-swap
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "5800"
    spec:
      containers:
      - name: llama-swap
        image: ghcr.io/mostlygeek/llama-swap:cuda
        ports:
        - containerPort: 8080
          name: api
        - containerPort: 5800
          name: model-0
        - containerPort: 5801
          name: model-1
        - containerPort: 5802
          name: model-2
        - containerPort: 5803
          name: model-3
        - containerPort: 5804
          name: model-4
        - containerPort: 5805
          name: model-5
        resources:
          limits:
            nvidia.com/gpu: "1"
          requests:
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: models
          mountPath: /data/models
        - name: config
          mountPath: /app/config.yaml
          subPath: models.yml
        env:
        - name: CONFIG_FILE
          value: /app/config.yaml
      volumes:
      - name: models
        hostPath:
          path: /data/models
          type: Directory
      - name: config
        configMap:
          name: llama-swap-config
---
apiVersion: v1
kind: Service
metadata:
  name: llama-swap
  namespace: ai-stack
spec:
  type: NodePort
  selector:
    app: llama-swap
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 31234
    name: api
  - port: 5800
    targetPort: 5800
    name: model-0
  - port: 5801
    targetPort: 5801
    name: model-1
  - port: 5802
    targetPort: 5802
    name: model-2
  - port: 5803
    targetPort: 5803
    name: model-3
  - port: 5804
    targetPort: 5804
    name: model-4
  - port: 5805
    targetPort: 5805
    name: model-5

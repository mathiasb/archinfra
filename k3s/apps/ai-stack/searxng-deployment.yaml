apiVersion: apps/v1
kind: Deployment
metadata:
  name: searxng
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: searxng
  template:
    metadata:
      labels:
        app: searxng
    spec:
      containers:
      - name: searxng
        image: docker.io/searxng/searxng:latest
        ports:
        - containerPort: 8080
        env:
        - name: SEARXNG_BASE_URL
          value: "http://searxng.ai-stack.svc.cluster.local:8080"
        - name: SEARXNG_PORT
          value: "8080"
---
apiVersion: v1
kind: Service
metadata:
  name: searxng
  namespace: ai-stack
spec:
  type: ClusterIP
  selector:
    app: searxng
  ports:
  - port: 8080
    targetPort: 8080

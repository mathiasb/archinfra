apiVersion: apps/v1
kind: Deployment
metadata:
  name: whisper
  namespace: ai-stack
spec:
  replicas: 1
  selector:
    matchLabels:
      app: whisper
  template:
    metadata:
      labels:
        app: whisper
    spec:
      containers:
      - name: whisper
        image: docker.io/fedirz/faster-whisper-server:latest-cpu
        ports:
        - containerPort: 8000
        volumeMounts:
        - name: models
          mountPath: /data/models/whisper
        env:
        - name: WHISPER__MODEL
          value: /data/models/whisper
      volumes:
      - name: models
        hostPath:
          path: /data/models/whisper
          type: Directory
---
apiVersion: v1
kind: Service
metadata:
  name: whisper
  namespace: ai-stack
spec:
  type: ClusterIP
  selector:
    app: whisper
  ports:
  - port: 8000
    targetPort: 8000

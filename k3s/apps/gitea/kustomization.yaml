apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
# The Gitea Deployment + Postgres + Valkey + Ingress + TLS Secret are all
# managed by the Gitea Helm chart, which is installed manually (not via a Flux
# HelmRelease).
#
# To apply changes from values.yaml, run from this directory:
#
#   helm repo update gitea-charts
#   helm upgrade gitea gitea-charts/gitea \
#     -n gitea \
#     --version 12.5.0 \
#     -f values.yaml
#
# Pin --version to whatever helm history shows as currently deployed; do NOT
# bump the chart as part of an unrelated values change. Bumping the chart is
# its own deliberate action (test in a separate PR).
#
# Flux owns these supplementary resources only:
resources:
  - admin-secret.enc.yaml
  - gitea-http-nodeport.yaml
  - gitea-ssh-nodeport.yaml

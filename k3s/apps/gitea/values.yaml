gitea:
  admin:
    username: mathias
    email: mathias.bergqvist@gmail.com
  config:
    server:
      DOMAIN: gitea.d-ma.be
      ROOT_URL: https://gitea.d-ma.be
    database:
      DB_TYPE: postgres

persistence:
  enabled: true
  size: 50Gi
  storageClass: local-path

postgresql-ha:
  enabled: false

postgresql:
  enabled: true
  primary:
    persistence:
      size: 10Gi
      storageClass: local-path

ingress:
  enabled: true
  ingressClassName: nginx
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"  # unlimited — needed for container image pushes
  hosts:
    - host: gitea.d-ma.be
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: gitea-tls
      hosts:
        - gitea.d-ma.be

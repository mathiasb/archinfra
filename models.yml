# models.yml — single source of truth for all model slots
# Generated configs: llama-swap ConfigMap, LiteLLM config, MODELS.md
# Manual edits only — everything downstream is derived from this file.

hardware:
  koala:
    gpu: "RTX 5070"
    vram_gb: 12
    ram_gb: 64
    platform: llama-swap
    access: kubectl
    host: "10.0.1.20"
    llama_swap_port: 31234
    model_path: "/data/models/huggingface"
  iguana:
    gpu: "M2 Ultra"
    unified_memory_gb: 64
    platform: ollama
    access: ssh
    host: "10.0.1.25"
    ollama_port: 11434

# llama-swap server defaults (koala)
llama_swap:
  server:
    listen: "0.0.0.0"
    port: 8080
  env:
    HF_HOME: "/data/models/huggingface"
    CUDA_VISIBLE_DEVICES: "0"
    OMP_NUM_THREADS: "16"
    GGML_NUM_THREADS: "16"
    GGML_NO_ALLOCATOR: "1"
    LLAMA_CACHE_CAPACITY: "16GiB"
    LLAMA_SET_ROWS: "1"
  llama_defaults:
    threads: 16

slots:
  # ── koala (llama-swap via k8s) ──────────────────────────────

  koala/quality-coder:
    model: "unsloth/Qwen3-Coder-30B-A3B-Instruct-GGUF"
    file: "Qwen3-Coder-30B-A3B-Instruct-UD-Q4_K_XL.gguf"
    litellm_name: "koala/qwen3-coder-30b"
    port: 5800
    use_case: "Agentic coding (quality, complex tasks)"
    params:
      ctx_size: 32768
      ngl: 10
      batch_size: 128
      ubatch_size: 64
      cache_type_k: q8_0
      cache_type_v: q5_0
      flash_attn: true
      kv_unified: true
      cache_reuse: 256
    sampling:
      temp: 0.2
      top_p: 0.9
      top_k: 64
      repeat_penalty: 1.07
    benchmark_targets:
      min_tok_s: 10

  koala/fast-general:
    model: "unsloth/Phi-4-mini-instruct-GGUF"
    file: "Phi-4-mini-instruct.Q8_0.gguf"
    litellm_name: "koala/phi4-mini"
    port: 5801
    use_case: "Quick one-off tasks, tool calls"
    params:
      ctx_size: 8192
      ngl: 60
      batch_size: 512
      ubatch_size: 128
      cache_type_k: q8_0
      cache_type_v: f16
      kv_unified: true
      cache_reuse: 256
    sampling:
      temp: 0.2
      top_p: 0.9
      top_k: 64
      repeat_penalty: 1.05
    benchmark_targets:
      min_tok_s: 80

  koala/general:
    model: "bartowski/phi-4-GGUF"
    file: "phi-4-Q4_K_M.gguf"
    litellm_name: "koala/phi4-14b"
    port: 5802
    use_case: "Chat / general assistant"
    params:
      ctx_size: 8192
      ngl: 64
      batch_size: 448
      ubatch_size: 128
      cache_type_k: q8_0
      cache_type_v: f16
      kv_unified: true
      cache_reuse: 256
    sampling:
      temp: 0.2
      top_p: 0.9
      top_k: 64
      repeat_penalty: 1.05

  koala/llama-3.2-3b:
    model: "bartowski/Llama-3.2-3B-Instruct-GGUF"
    file: "Llama-3.2-3B-Instruct-Q8_0.gguf"
    litellm_name: "koala/llama-3.2-3b"
    port: 5803
    use_case: "Lightweight inference (under review — may be superseded by phi4-mini)"
    params:
      ctx_size: 8192
      ngl: 60
      batch_size: 512
      ubatch_size: 128
      cache_type_k: q8_0
      cache_type_v: f16
      kv_unified: true
      cache_reuse: 256
    sampling:
      temp: 0.2
      top_p: 0.9
      top_k: 64
      repeat_penalty: 1.05

  koala/deepseek-coder-v2-lite:
    model: "bartowski/DeepSeek-Coder-V2-Lite-Instruct-GGUF"
    file: "DeepSeek-Coder-V2-Lite-Instruct-Q4_K_M.gguf"
    litellm_name: "koala/deepseek-coder-v2-lite"
    port: 5804
    use_case: "Coding (under review — may be superseded by qwen3-coder-30b)"
    params:
      ctx_size: 12000
      ngl: 20
      batch_size: 512
      ubatch_size: 128
      cache_type_k: q8_0
      cache_type_v: q5_0
      flash_attn: true
      kv_unified: true
      cache_reuse: 256
    sampling:
      temp: 0.2
      top_p: 0.9
      top_k: 64
      repeat_penalty: 1.05

  koala/fast-coder:
    model: "unsloth/Qwen3.5-9B-GGUF"
    file: "Qwen3.5-9B-UD-Q4_K_XL.gguf"
    litellm_name: "koala/qwen35-9b-fast"
    port: 5805
    use_case: "Agentic coding (fast, many tool calls)"
    params:
      ctx_size: 262144
      ngl: 99
      batch_size: 2048
      ubatch_size: 512
      cache_type_k: q4_0
      cache_type_v: q4_0
      flash_attn: true
      kv_unified: true
      cache_reuse: 256
    sampling:
      temp: 0.6
      top_p: 0.95
      top_k: 20
      repeat_penalty: 1.07
    benchmark_targets:
      min_tok_s: 50

  # ── iguana (ollama) ─────────────────────────────────────────

  iguana/quality-coder:
    model: "qwen3-coder-next"
    litellm_name: "iguana/qwen3-coder-next"
    use_case: "Agentic coding (quality, complex tasks)"
    params:
      num_ctx: 65536
    benchmark_targets:
      min_tok_s: 15

  iguana/general:
    model: "qwen3.5:35b"
    litellm_name: "iguana/qwen35-35b"
    use_case: "Chat / general assistant (OpenWebUI)"
    params:
      num_ctx: 32768
    benchmark_targets:
      min_tok_s: 20

  iguana/reasoning:
    model: "deepseek-r1-tuned"
    litellm_name: "iguana/deepseek-r1-14b"
    litellm_skip: true  # routes managed in extras.yaml (think/no-think variants)
    use_case: "Reasoning / planning"
    params:
      num_ctx: 16384
    benchmark_targets:
      min_tok_s: 15

  iguana/embed:
    model: "nomic-embed-text"
    litellm_name: "iguana/nomic-embed"
    type: embedding
    use_case: "Embeddings (RAG)"

  iguana/rerank:
    model: "Qwen3-Reranker-0.6B"
    litellm_name: "iguana/qwen3-reranker"
    type: reranker
    use_case: "Search result reranking"

  iguana/stt:
    model: "mlx-community/whisper-large-v3-mlx"
    litellm_name: "iguana/whisper"
    platform: mlx-openai-server
    port: 8100
    type: stt
    use_case: "Speech to text"
